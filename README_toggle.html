<!doctype html>
<html lang="en">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>README Language Toggle</title>
<style>
  body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:24px}
  #controls{margin-bottom:16px}
  .lang{display:none}
  .visible{display:block}
  pre{background:#f6f8fa;padding:12px;border-radius:6px;overflow:auto}
</style>
<div id="controls">
  <button id="btn-zh">中文</button>
  <button id="btn-en">English</button>
  <a href="README.md" style="margin-left:12px">Open README.md</a>
</div>

<div id="zh" class="lang">
  <h2>快速开始（中文）</h2>
  <p>示例：运行并查看指标</p>
  <pre>go run ./cmd
curl http://localhost:8080/hello
curl http://localhost:8080/metrics</pre>
</div>

<div id="en" class="lang visible">
  <h2>Quick Start (English)</h2>
  <p>Example: run and view metrics</p>
  <pre>go run ./cmd
curl http://localhost:8080/hello
curl http://localhost:8080/metrics</pre>
</div>

<script>
  const zh=document.getElementById('zh');
  const en=document.getElementById('en');
  document.getElementById('btn-zh').addEventListener('click',()=>{zh.classList.add('visible');en.classList.remove('visible')});
  document.getElementById('btn-en').addEventListener('click',()=>{en.classList.add('visible');zh.classList.remove('visible')});
  // default to English
  document.getElementById('btn-en').click()
</script>

</html>
